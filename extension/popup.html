<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Arivu - Save Bookmark</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 350px;
      padding: 20px;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .icon {
      width: 32px;
      height: 32px;
      background: #18181B;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0A0A0A;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #52525b;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: white;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #18181B;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #18181B;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .login-prompt {
      text-align: center;
      padding: 20px;
    }
    .login-prompt p {
      margin-bottom: 12px;
      color: #52525b;
    }
    .link {
      color: #18181B;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">📑</div>
    <h1>Save to Arivu</h1>
  </div>

  <div id="loginPrompt" class="login-prompt" style="display:none;">
    <p>Please log in to save bookmarks</p>
    <a href="https://knolhub.preview.emergentagent.com/auth" target="_blank" class="link">Open Arivu →</a>
  </div>

  <form id="saveForm" style="display:none;">
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="url" readonly>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="title" placeholder="Page title">
    </div>
    <div class="form-group">
      <label>Collection (Optional)</label>
      <select id="collection">
        <option value="">None</option>
      </select>
    </div>
    <button type="submit" class="btn" id="saveBtn">Save Bookmark</button>
    <div id="status" class="status" style="display:none;"></div>
  </form>

  <script src="popup.js"></script>
</body>
</html>
