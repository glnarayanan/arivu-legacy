version: 2
updates:
  # Python (pip) - backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # npm/yarn - frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"

  # GitHub Actions (if you use them)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
