[tool.black]
line-length = 120
target-version = ["py311"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "S",   # flake8-bandit (security)
  "UP",  # pyupgrade
]
ignore = [
  "E501",  # line too long (handled by black)
  "S101",  # assert usage (needed in tests)
  "S105",  # hardcoded password (false positives in tests)
  "S106",  # hardcoded password (false positives in tests)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S"]
"backend/server.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
markers = [
  "integration: marks tests requiring Docker (deselect with '-m \"not integration\"')",
]
