version: '3.8'

# ===================================
# Arivu — Self-Hosted Deployment
# ===================================
# Minimal stack: Frontend (entry point), Backend, MongoDB, Redis.
# Frontend nginx is the entry point.
#
# Usage:
#   cp .env.example .env   # edit with your values
#   docker compose up -d --build
# ===================================

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: arivu-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: ${DB_NAME:-arivu_db}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - arivu-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Redis for session/lockout state
  redis:
    image: redis:7-alpine
    container_name: arivu-redis
    restart: always
    networks:
      - arivu-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arivu-backend
    restart: always
    init: true
    command: >
      uvicorn server:app --host 0.0.0.0 --port 8001
      --workers 1 --timeout-keep-alive 75
      --timeout-graceful-shutdown 30 --limit-max-requests 5000
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme123}@mongodb:27017/}
      DB_NAME: ${DB_NAME:-arivu_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      APP_URL: ${APP_URL:-http://localhost}
      X_INTEGRATION_ENABLED: ${X_INTEGRATION_ENABLED:-false}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      X_REDIRECT_URI: ${X_REDIRECT_URI:-}
      X_MAX_BOOKMARK_PAGES: ${X_MAX_BOOKMARK_PAGES:-10}
      X_MAX_BOOKMARKS: ${X_MAX_BOOKMARKS:-300}
      SIGNUPS_ENABLED: ${SIGNUPS_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arivu-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/api/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend — entry point (serves React app + proxies API)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arivu-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - arivu-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  arivu-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
